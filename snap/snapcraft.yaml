name: vtun-ng
base: core22
version: '3.1.1'
license: GPL-2.0-or-later
title: simple network tunneling service
summary: vtun-ng simple IP-tunneling solution
description: vtun-ng is a simple IP-tunneling solution compatible with vtun

contact:
  - sigsegv@radiotube.org

issues:
  - https://github.com/leakingmemory/vtun-ng/issues
website:
  - https://github.com/leakingmemory/vtun-ng

source-code:
  - https://github.com/leakingmemory/vtun-ng.git

grade: stable
confinement: strict

apps:
  vtunngd:
    command: bin/vtunngd
    plugs:
      - network
      - network-bind
      - network-control
      - system-observe
      - process-control

parts:
  vtun-ng:
    plugin: rust
    source: .
    rust-channel: "1.88.0"
    stage-packages:
      - net-tools
      - iproute2
